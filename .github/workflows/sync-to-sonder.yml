name: Sync Notion to Supabase

on:
  # schedule:
  #   # 每 12 小时执行一次（UTC 时间：0:00 和 12:00）
  #   - cron: '0 */12 * * *'

  # push:
  #   branches:
  #     - main

  workflow_dispatch:
    # 支持手动触发
    inputs:
      days:
        description: '同步最近多少天的页面（留空则默认同步最近 1 天）'
        required: false
        type: string
        default: '1'
      ignoreUpdateTime:
        description: '忽略更新时间检查，强制同步所有 Notion 页面'
        required: false
        type: boolean
        default: false
      force_sync_obsidian:
        description: '强制同步所有 Obsidian 文件（忽略更新时间检查）'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SONDER_R2_ACCESS_KEY: ${{ secrets.SONDER_R2_ACCESS_KEY }}
      SONDER_R2_SECRET_KEY: ${{ secrets.SONDER_R2_SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Calculate time range
        id: time
        run: |
          # 获取当前 UTC 时间戳（秒）
          UTC_TIMESTAMP=$(date -u +%s)

          # 加 8 小时（28800 秒）得到北京时间戳
          BEIJING_TIMESTAMP=$((UTC_TIMESTAMP + 28800))

          # 转换为北京时间格式
          END_TIME=$(date -u -d "@$BEIJING_TIMESTAMP" +"%Y%m%d%H%M%S")

          # 判断是手动触发且有输入天数，还是定时触发（默认12小时）
          DAYS="${{ github.event.inputs.days }}"

          if [ -n "$DAYS" ] && [ "$DAYS" != "0" ]; then
            # 手动触发：同步最近 N 天
            SECONDS_AGO=$((DAYS * 86400))  # 天数转换为秒（1天 = 86400秒）
            START_TIMESTAMP=$((BEIJING_TIMESTAMP - SECONDS_AGO))
            START_TIME=$(date -u -d "@$START_TIMESTAMP" +"%Y%m%d%H%M%S")
            echo "📅 手动触发：同步最近 $DAYS 天的页面"
          else
            # 定时触发或手动触发但未输入天数：默认 12 小时
            START_TIMESTAMP=$((BEIJING_TIMESTAMP - 43200))  # 12小时 = 43200秒
            START_TIME=$(date -u -d "@$START_TIMESTAMP" +"%Y%m%d%H%M%S")
            echo "⏰ 定时触发：同步最近 12 小时的页面"
          fi

          echo "start_time=$START_TIME" >> $GITHUB_OUTPUT
          echo "end_time=$END_TIME" >> $GITHUB_OUTPUT

          echo "Time range (Beijing Time): $START_TIME to $END_TIME"

      - name: Sync Notion databases
        id: sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_IDS: ${{ vars.NOTION_DATABASE_IDS }}
        run: |
          # 从环境变量读取数据库 ID 列表（逗号分隔）
          # 例如：NOTION_DATABASE_IDS="id1,id2,id3"

          if [ -z "$NOTION_DATABASE_IDS" ]; then
            echo "::error::NOTION_DATABASE_IDS 未配置"
            exit 1
          fi

          # 将逗号分隔的字符串转换为数组
          IFS=',' read -ra DATABASES <<< "$NOTION_DATABASE_IDS"

          START_TIME="${{ steps.time.outputs.start_time }}"
          END_TIME="${{ steps.time.outputs.end_time }}"
          IGNORE_UPDATE_TIME="${{ github.event.inputs.ignoreUpdateTime }}"

          echo "=========================================="
          echo "开始同步 Notion 数据库"
          echo "时间范围: $START_TIME - $END_TIME"
          echo "数据库数量: ${#DATABASES[@]}"
          if [ "$IGNORE_UPDATE_TIME" = "true" ]; then
            echo "⚠️  忽略更新时间检查: 是"
          fi
          echo "=========================================="
          echo ""

          # 统计变量
          TOTAL_DBS=${#DATABASES[@]}
          SUCCESS_COUNT=0
          FAIL_COUNT=0
          FAILED_DBS=()
          HAS_UPDATES=false

          # 创建临时文件用于收集每个数据库的 has_updates 状态
          TEMP_OUTPUT_FILE=$(mktemp)

          # 遍历所有数据库
          INDEX=1
          for DB_ID in "${DATABASES[@]}"; do
            # 去除空格
            DB_ID=$(echo "$DB_ID" | xargs)

            if [ -z "$DB_ID" ]; then
              continue
            fi

            echo "=========================================="
            echo "[$INDEX/$TOTAL_DBS] 同步数据库"
            echo "数据库 ID: $DB_ID"
            echo "=========================================="

            # 构建同步命令
            # 使用临时文件收集每个数据库的输出
            SYNC_CMD="GITHUB_OUTPUT=\"$TEMP_OUTPUT_FILE\" bun run dist/index.js sync-notion-database \"$DB_ID\" \"$START_TIME\" \"$END_TIME\""
            if [ "$IGNORE_UPDATE_TIME" = "true" ]; then
              SYNC_CMD="$SYNC_CMD --ignore-update-time"
            fi

            # 执行同步命令并捕获输出
            SYNC_OUTPUT=$(eval $SYNC_CMD 2>&1)
            SYNC_EXIT_CODE=$?

            echo "$SYNC_OUTPUT"

            if [ $SYNC_EXIT_CODE -eq 0 ]; then
              echo "✅ 数据库同步成功"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))

              # 检查临时文件中是否有 has_updates=true
              if grep -q "has_updates=true" "$TEMP_OUTPUT_FILE"; then
                HAS_UPDATES=true
                echo "🔔 检测到此数据库有数据更新"
              fi

              # 清空临时文件，为下一个数据库做准备
              > "$TEMP_OUTPUT_FILE"
            else
              echo "❌ 数据库同步失败"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              FAILED_DBS+=("$DB_ID")
            fi

            echo ""
            INDEX=$((INDEX + 1))
          done

          # 输出最终统计
          echo "=========================================="
          echo "同步完成统计"
          echo "=========================================="
          echo "总数据库数: $TOTAL_DBS"
          echo "成功: $SUCCESS_COUNT"
          echo "失败: $FAIL_COUNT"

          # 如果有失败的数据库，列出详情
          if [ $FAIL_COUNT -gt 0 ]; then
            echo ""
            echo "失败的数据库:"
            for FAILED_DB in "${FAILED_DBS[@]}"; do
              echo "  - $FAILED_DB"
            done
            echo ""
            echo "=========================================="
            exit 1
          fi

          echo "=========================================="
          echo "✅ 所有数据库同步成功！"
          echo "=========================================="

          # 清理临时文件
          rm -f "$TEMP_OUTPUT_FILE"

          # 设置输出变量
          echo "has_updates=$HAS_UPDATES" >> $GITHUB_OUTPUT
          echo "📊 Notion 同步最终状态: has_updates=$HAS_UPDATES"

      - name: Checkout ryze repository
        uses: actions/checkout@v4
        with:
          repository: vitahlin/ryze
          token: ${{ secrets.SONDER_RYZE_ANIVIA_GIT_TOKEN }}
          path: ryze-repo

      - name: Sync Obsidian from ryze
        id: sync-obsidian
        run: |
          echo "=========================================="
          echo "开始同步 Obsidian 内容"
          echo "=========================================="
          echo ""

          # 创建临时文件用于收集 has_updates 状态
          TEMP_OUTPUT_FILE=$(mktemp)

          # Obsidian vault 路径（ryze 仓库根目录）
          VAULT_PATH="ryze-repo"

          echo "Obsidian vault 路径: $VAULT_PATH"

          # 检查路径是否存在
          if [ ! -d "$VAULT_PATH" ]; then
            echo "❌ 错误: 路径不存在: $VAULT_PATH"
            echo "当前工作目录: $(pwd)"
            echo "目录内容:"
            ls -la
            exit 1
          fi

          echo "✅ 路径存在"
          echo "Markdown 文件数量: $(find "$VAULT_PATH" -name "*.md" | wc -l)"
          echo ""

          # 构建同步命令
          SYNC_CMD="bun run dist/index.js sync-obsidian \"$VAULT_PATH\" --recursive"

          # 如果启用了强制同步，添加 --force 参数
          if [ "${{ github.event.inputs.force_sync_obsidian }}" == "true" ]; then
            SYNC_CMD="$SYNC_CMD --force"
            echo "⚠️  Obsidian 强制同步模式已启用"
          fi

          echo "执行命令: GITHUB_OUTPUT=\"$TEMP_OUTPUT_FILE\" $SYNC_CMD"
          echo ""

          # 执行同步命令
          GITHUB_OUTPUT="$TEMP_OUTPUT_FILE" eval $SYNC_CMD
          SYNC_EXIT_CODE=$?

          echo ""
          echo "命令退出码: $SYNC_EXIT_CODE"

          HAS_UPDATES=false
          if [ $SYNC_EXIT_CODE -eq 0 ]; then
            echo "✅ Obsidian 同步成功"

            # 检查临时文件中是否有 has_updates=true
            if grep -q "has_updates=true" "$TEMP_OUTPUT_FILE"; then
              HAS_UPDATES=true
              echo "🔔 检测到 Obsidian 有数据更新"
            fi
          else
            echo "❌ Obsidian 同步失败"
            rm -f "$TEMP_OUTPUT_FILE"
            exit 1
          fi

          # 清理临时文件
          rm -f "$TEMP_OUTPUT_FILE"

          # 设置输出变量
          echo "has_updates=$HAS_UPDATES" >> $GITHUB_OUTPUT
          echo "📊 Obsidian 同步最终状态: has_updates=$HAS_UPDATES"

      - name: Determine if should notify
        id: should-notify
        run: |
          NOTION_UPDATES="${{ steps.sync.outputs.has_updates }}"
          OBSIDIAN_UPDATES="${{ steps.sync-obsidian.outputs.has_updates }}"

          echo "Notion 更新状态: $NOTION_UPDATES"
          echo "Obsidian 更新状态: $OBSIDIAN_UPDATES"

          # 只要有一个为 true，就通知
          if [ "$NOTION_UPDATES" = "true" ] || [ "$OBSIDIAN_UPDATES" = "true" ]; then
            echo "should_notify=true" >> $GITHUB_OUTPUT
            echo "📊 最终决定: 需要通知 sonder 项目"
          else
            echo "should_notify=false" >> $GITHUB_OUTPUT
            echo "📊 最终决定: 无需通知 sonder 项目"
          fi

      - name: Notify sonder to sync posts (data updated)
        if: steps.should-notify.outputs.should_notify == 'true'
        run: |
          echo "🔔 检测到数据更新，通知 sonder 项目同步文章..."
          curl -X POST https://api.github.com/repos/vitahlin/sonder/dispatches \
            -H "Authorization: token ${{ secrets.SONDER_RYZE_ANIVIA_GIT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type":"sync-posts"}'
          echo "✅ 通知已发送"

      - name: Notify sonder to sync posts (main push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "🔔 检测到 main 分支有新提交，通知 sonder 项目同步文章..."
          curl -X POST https://api.github.com/repos/vitahlin/sonder/dispatches \
            -H "Authorization: token ${{ secrets.SONDER_RYZE_ANIVIA_GIT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type":"sync-posts"}'
          echo "✅ 通知已发送"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Notion 同步失败，请检查日志"

